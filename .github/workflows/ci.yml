name: MoonBit CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install MoonBit on Unix
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: MoonBit versions
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: moon check --target all
        run: moon check --target all --deny-warn

      - name: moon fmt --deny-warn
        run: moon fmt --check

      - name: moon check --fmt --deny-warn
        run: moon check --fmt --deny-warn

      - name: moon info --deny-warn
        run: moon info --target all

      - name: Ensure generated interfaces stay clean
        run: git diff --exit-code

      - name: moontest
        run: moon test --target all
